<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo Logos</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .filtros { margin-bottom: 20px; }
        .btn { background: #333; color: white; border: none; padding: 10px 15px; margin: 5px; border-radius: 5px; cursor: pointer; }
        .btn.activo { background: #007bff; }
        
        /* LA MAGIA: El grid usa transiciones */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
            transition: all 0.5s ease;
        }
        .card { 
            background: #1e1e1e; padding: 10px; border-radius: 10px; 
            transition: all 0.5s ease; /* Esto hace que se deslicen suavemente */
            overflow: hidden;
        }
        .card.oculto { opacity: 0; transform: scale(0); width: 0; padding: 0; margin: 0; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Librería Logos</h1>
    <div class="filtros">
        <button class="btn" onclick="filtrar('RV1960', this)">RV 1960</button>
        <button class="btn" onclick="filtrar('NTV', this)">NTV</button>
        <button class="btn" onclick="limpiar(this)">Ver Todas</button>
    </div>

    <div class="grid" id="catalogo">
        <div class="card" data-version="RV1960">
            <img src="0-imagenes/9780789924155.jpg">
            <p>RV 1960 - $180.000</p>
        </div>
        <div class="card" data-version="NTV">
            <img src="0-imagenes/9781414323456.jpg">
            <p>NTV - $150.000</p>
        </div>
    </div>

    <script>
        function filtrar(version, btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('activo'));
            btn.classList.add('activo');
            
            document.querySelectorAll('.card').forEach(card => {
                if(card.getAttribute('data-version') === version) {
                    card.classList.remove('oculto');
                } else {
                    card.classList.add('oculto');
                }
            });
        }
        
        function limpiar(btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('activo'));
            btn.classList.add('activo');
            document.querySelectorAll('.card').forEach(card => card.classList.remove('oculto'));
        }
    </script>
</body>
</html>
