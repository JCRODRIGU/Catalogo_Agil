<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Logos</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #007bff; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .filtros { margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .btn-filtro { 
            background: #333; color: white; border: 1px solid #444; padding: 8px 16px; 
            border-radius: 20px; cursor: pointer; transition: all 0.2s; 
            font-size: 14px; min-width: 100px;
        }
        .btn-filtro:hover { background: #444; }
        .btn-filtro.activo { background: var(--accent); border-color: var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 10px; border-radius: 10px; transition: 0.3s; }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        .btn-comprar { background: #25d366; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Librería Logos</h1>
    
    <h3>1. Versión:</h3>
    <div class="filtros" id="f-version">
        <button class="btn-filtro" onclick="filtrar('version', 'RV1960', this)">RV 1960</button>
        <button class="btn-filtro" onclick="filtrar('version', 'NTV', this)">NTV</button>
        <button class="btn-filtro" onclick="filtrar('version', 'NVI', this)">NVI</button>
    </div>
    
    <h3>2. Presentación:</h3>
    <div class="filtros" id="f-genero">
        <button class="btn-filtro" onclick="filtrar('genero', 'Hombre', this)">Hombre</button>
        <button class="btn-filtro" onclick="filtrar('genero', 'Mujer', this)">Mujer</button>
    </div>

    <div id="contenedor-productos" class="grid"></div>

    <script>
        const productos = [
            { id: "9780789924155", nombre: "Biblia RV 1960", version: "RV1960", genero: "Hombre" },
            { id: "9781414323456", nombre: "Biblia NTV Rosa", version: "NTV", genero: "Mujer" }
        ];

        let filtrosActivos = { version: '', genero: '' };

        function filtrar(tipo, valor, btn) {
            // Quitar clase activo solo a los hermanos
            btn.parentElement.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('activo'));
            btn.classList.add('activo');
            
            filtrosActivos[tipo] = valor;
            mostrarProductos();
        }

        function mostrarProductos() {
            const contenedor = document.getElementById('contenedor-productos');
            contenedor.innerHTML = '';
            
            const filtrados = productos.filter(p => 
                (filtrosActivos.version === '' || p.version === filtrosActivos.version) &&
                (filtrosActivos.genero === '' || p.genero === filtrosActivos.genero)
            );
            
            filtrados.forEach(p => {
                contenedor.innerHTML += `
                    <div class="card">
                        <img src="0-imagenes/${p.id}.jpg" alt="${p.nombre}">
                        <p>${p.nombre}</p>
                        <button class="btn-comprar" onclick="window.open('https://wa.me/573125756581?text=Hola, quiero la ${p.nombre}')">Pedir por WhatsApp</button>
                    </div>
                `;
            });
        }
        mostrarProductos();
    </script>
</body>
</html>
