<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Logos</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #007bff; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .filtros { margin-bottom: 30px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .btn { background: #333; color: white; border: 1px solid #444; padding: 10px 20px; border-radius: 20px; cursor: pointer; transition: all 0.3s; }
        .btn.activo { background: var(--accent); border-color: var(--accent); }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
        }
        .card { background: var(--card); padding: 15px; border-radius: 12px; transition: all 0.5s ease; overflow: hidden; }
        .card.oculto { opacity: 0; transform: scale(0); width: 0; padding: 0; margin: 0; }
        .card img { width: 100%; height: 220px; object-fit: contain; background: #000; border-radius: 8px; margin-bottom: 10px; }
        .btn-comprar { margin-top: 10px; background: #25d366; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Librería Logos</h1>
    
    <div class="filtros" id="contenedor-filtros">
        <button class="btn" onclick="filtrar('RV1960', this)">RV 1960</button>
        <button class="btn" onclick="filtrar('NTV', this)">NTV</button>
        <button class="btn" onclick="limpiar(this)">Ver Todas</button>
    </div>

    <div class="grid" id="catalogo">
        <div class="card" data-version="RV1960">
            <img src="0-imagenes/9780789924155.jpg" alt="Biblia">
            <p>Biblia RV 1960 - $180.000</p>
            <button class="btn-comprar" onclick="window.open('https://wa.me/573125756581?text=Hola, quiero la Biblia RV 1960')">Pedir</button>
        </div>
        </div>

    <script>
        function filtrar(version, btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('activo'));
            btn.classList.add('activo');
            
            document.querySelectorAll('.card').forEach(card => {
                if(card.getAttribute('data-version') === version) {
                    card.classList.remove('oculto');
                } else {
                    card.classList.add('oculto');
                }
            });
        }
        
        function limpiar(btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('activo'));
            btn.classList.add('activo');
            document.querySelectorAll('.card').forEach(card => card.classList.remove('oculto'));
        }
    </script>
</body>
</html>
