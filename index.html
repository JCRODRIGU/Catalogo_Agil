<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Logos</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #007bff; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        /* Contenedores con altura mínima fija para evitar saltos */
        .seccion-filtros { min-height: 200px; }
        .filtros { margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        
        .btn-filtro { 
            background: #333; color: white; border: 1px solid #444; padding: 10px 20px; 
            border-radius: 20px; cursor: pointer; transition: all 0.2s; 
            font-size: 14px; min-width: 110px;
        }
        .btn-filtro.activo { background: var(--accent); border-color: var(--accent); transform: scale(1.02); }
        
        /* Grid estable */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 20px; 
            margin-top: 20px; 
            min-height: 500px; 
            align-content: start;
        }
        .card { background: var(--card); padding: 12px; border-radius: 12px; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: #000; }
        .btn-comprar { margin-top: auto; background: #25d366; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Librería Logos</h1>
    
    <div class="seccion-filtros">
        <h3>1. Versión:</h3>
        <div class="filtros">
            <button class="btn-filtro" onclick="filtrar('version', 'RV1960', this)">RV 1960</button>
            <button class="btn-filtro" onclick="filtrar('version', 'NTV', this)">NTV</button>
            <button class="btn-filtro" onclick="filtrar('version', 'NVI', this)">NVI</button>
        </div>
        <h3>2. Presentación:</h3>
        <div class="filtros">
            <button class="btn-filtro" onclick="filtrar('genero', 'Hombre', this)">Hombre</button>
            <button class="btn-filtro" onclick="filtrar('genero', 'Mujer', this)">Mujer</button>
        </div>
    </div>

    <div id="contenedor-productos" class="grid"></div>

    <script>
        const productos = [
            { id: "9780789924155", nombre: "Biblia RV 1960", version: "RV1960", genero: "Hombre" },
            { id: "9781414323456", nombre: "Biblia NTV Rosa", version: "NTV", genero: "Mujer" }
        ];

        let filtros = { version: '', genero: '' };

        function filtrar(tipo, valor, btn) {
            // Manejo de botones activos
            btn.parentElement.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('activo'));
            btn.classList.add('activo');
            
            filtros[tipo] = valor;
            renderizar();
        }

        function renderizar() {
            const contenedor = document.getElementById('contenedor-productos');
            const filtrados = productos.filter(p => 
                (filtros.version === '' || p.version === filtros.version) &&
                (filtros.genero === '' || p.genero === filtros.genero)
            );
            
            contenedor.innerHTML = filtrados.map(p => `
                <div class="card">
                    <img src="0-imagenes/${p.id}.jpg" alt="${p.nombre}">
                    <p>${p.nombre}</p>
                    <button class="btn-comprar" onclick="window.open('https://wa.me/573125756581?text=Hola, quiero la ${p.nombre}')">WhatsApp</button>
                </div>
            `).join('');
        }
        
        renderizar();
    </script>
</body>
</html>
